{% extends 'tips/base.html' %}

{% block title %} Home {% endblock %}

{% block content %}
    <h1>Welcome to the Health Tip board</h1>
    <p>Your daily dose of Health Wisdom.</p>

    <h2>Add a New Tip</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Add Tip</button>
    </form>

    {% for tip in tips %}
        <h3>{{ tip.title }}</h3>
        <p>{{ tip.content }}</p>
        <hr>
    {% endfor %}
{% endblock %}
