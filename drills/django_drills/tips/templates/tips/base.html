{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %} Health Tip Board {% endblock %}</title>
    <link rel="stylesheet" href="{% static 'tips/style.css' %}">
    <script src="{% static 'tips/main.js' %}" defer></script>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/tip/">Tip of the Day</a>
    </nav>
    <hr>
    {% block content %}
    {% endblock content %}

    
    <!-- Modal -->
    <div id="Modal">
        <div id="innerModal">
            <p>Are you sure you want to delete this tip?</p>
            <button id="confirmDelete">Yes, Delete</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>
</body>
</html>
